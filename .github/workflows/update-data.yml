name: 데이터 갱신 (전월 말 종가 → 이번달 신호)

on:
  schedule:
    # 매달 1일 21:30 UTC = 한국시간 매달 2일 06:30 — 전월 말 거래 데이터가 확실히 반영된 뒤 실행
    - cron: "30 21 1 * *"
  workflow_dispatch: {} # 수동 실행 버튼 (Actions 탭에서 즉시 재계산 가능)

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: 가격·매크로 데이터 수집
        run: python scripts/update_data.py

      - name: 전략 신호·백테스트 계산
        run: python scripts/build_output.py

      - name: 변경사항 커밋
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          git diff --cached --quiet && echo "변경 없음, 커밋 생략" || git commit -m "chore: 데이터 자동 갱신 $(date -u +%Y-%m-%d)"
          git push
