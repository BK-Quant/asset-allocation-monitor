name: 코스피 데이터 갱신 (하락장 대응 계산기)

on:
  schedule:
    # 평일 16:00 KST = 07:00 UTC (코스피 정규장 마감 15:30 이후)
    - cron: "0 7 * * 1-5"
  workflow_dispatch: {} # 수동 실행 버튼 (Actions 탭에서 즉시 갱신)

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: 의존성 설치
        run: pip install -r requirements.txt

      - name: 코스피 종가·1년고점 갱신
        run: python scripts/update_kospi.py

      - name: 변경사항 커밋
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/kospi.json
          git diff --cached --quiet && echo "변경 없음, 커밋 생략" || git commit -m "chore: 코스피 데이터 자동 갱신 $(date -u +%Y-%m-%d)"
          git push
